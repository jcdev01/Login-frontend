<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration page</title>
    <link rel="stylesheet" href="css/styles_login.css">
    <script src="js/script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script src="js/script.js" defer></script>
     <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>
   
 <div class="conteiner_cadastro">
    <div class="icone_login_cadastro">
        <p>C</p>
    
</div>
    
    <h1 class="title_cadastro">Crie sua conta</h1>
    <p class="descricao_cadastro">Preencha os dados abaixo para começar</p>


<div class="nome">
    <p>NOME COMPLETO </p>
    <input type="text" placeholder="seu nome"  id="nome_cadastro">

</div>


<div class="email_cadastro"> 
    <p >E-MAIL</p>
    <input type="email" placeholder="seu@gmail.com" id="email_cadastro">
</div>
    
<div class="senha_cadastro">
    <div class="senha_top">
        <p>SENHA</p>
    </div>
    <input type="password" placeholder="senha" id="password_cadastro">
    
</div>
    
 <button onclick="cadastrar_usuario()" class="btn_entrar_cadastro" type="submit">Criar conta →</button >

    <p>ou</p>

    <div id="g_id_onload"
     data-client_id="825930097023-rcqinabvp49hpmtik10usipufdpjvvcs.apps.googleusercontent.com"
     data-callback="handleGoogleLogin"  
     data-type="button">
</div>    

<div class="g_id_signin"
     data-type="button"
     data-size="large"
     data-text="signin_with"
     data-theme="outline"
     data-shape="rectangular">
</div>  

    <p class="criar_conta">Já tem uma conta? <a href="index.html" class="link_criar_conta">faça o login</a></p>

</div>
    
    

</body>
</html>
