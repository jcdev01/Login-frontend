<!DOCTYPE html>
<html lang="Pt-br">
<head>

    <title>Registration page</title>
    <link rel="stylesheet" href="css/styles_login.css">
</head>
<body>
   
 <div class="conteiner_cadastro">

        <p>C</p>
    
</div>

    <p class="descricao_cadastro">Preencha os dados abaixo para começar</p>


<div class="nome">
    <p>NOME COMPLETO </p>
    <input type="text" placeholder="seu nome"  id="nome">

</div>


<div class="email_cadastro">

</div>
    
<div class="senha_cadastro">
    <div class="senha_top">
        <p>SENHA</p>
    </div>
    <input type="password" placeholder="senha",,id="password">
    
</div>
    
 <button class="btn_entrar_cadastro" type="submit">Criar conta →</button >

    <p>ou</p>

    <button class="btn_google_cadastro"type="submit"><img class="img_google_cadastro" src="assets/logo google.webp" alt="">Entrar com google </button>

    <p class="criar_conta">Já tem uma conta? <a href="login.html" class="link_criar_conta">faça o login</a></p>

</div>

</html>
