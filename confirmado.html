<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Confirmado</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url("/assets/fundo_web.jpg")
    }

    .card {
      background: #f5f4f0;
      border-radius: 20px;
      padding: 48px 44px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 64px; height: 64px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: pop 0.5s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    .checkmark {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw 0.5s 0.5s ease forwards;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 0.9rem;
      color: #888;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: block;
      width: 100%;
      background: #1a1a1a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 24px;
      font-size: 0.82rem;
      color: #aaa;
    }
    .footer a {
      color: #1a1a1a;
      font-weight: 500;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">

    <div class="icon-wrap">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <polyline class="checkmark"
          points="6,14 12,20 22,9"
          stroke="#fff" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Email confirmado!</h1>
    <p>Sua conta foi verificada com sucesso.<br>Você já pode fazer login.</p>

    <a href="login.html" class="btn">Entrar →</a>

    

  </div>
</body>
</html>
